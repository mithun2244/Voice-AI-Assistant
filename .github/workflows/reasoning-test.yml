name: Reasoning test

# Fully offline and deterministic: the NVIDIA LLM/embeddings and the Discord
# webhook are mocked in the test suite, so CI never depends on live endpoints
# (no NVIDIA_API_KEY secret, no network flakiness).
on:
  push:
  pull_request:

jobs:
  reasoning:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run offline reasoning + hand-off tests (mocked NVIDIA & Discord)
        working-directory: backend
        run: pytest tests -q
