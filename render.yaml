# Render Blueprint — https://render.com/docs/blueprint-spec
#
# Deploy: Render dashboard → New → Blueprint → connect this repo.
# Every env var marked `sync: false` is NOT stored here — Render prompts you to
# paste it in the dashboard (see DEPLOYMENT.md for the exact values).
#
# One service:
#   voice-agent-api — public FastAPI server (mints LiveKit tokens)
#
# NOTE: the LiveKit agent worker (STT → LangGraph → TTS) is intentionally NOT
# here — Render Background Workers require a paid plan. Run the worker elsewhere
# (locally, or a paid worker) for the voice path to actually respond. Without a
# worker running, the frontend can join a room but no agent will answer.

services:
  # ── FastAPI token/API server (public HTTP) ──────────────────────────
  - type: web
    name: voice-agent-api
    runtime: python
    plan: free
    branch: main
    # Slim install — token minting only, no ML stack (avoids free-tier OOM).
    buildCommand: pip install -r requirements-api.txt
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.10"
      # LiveKit Cloud credentials (Project Settings → Keys)
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      # Your deployed frontend origin, e.g. https://your-app.vercel.app
      - key: CORS_ALLOW_ORIGINS
        sync: false
